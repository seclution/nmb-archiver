version: '3.8'

services:
    open-archiver:
        image: reg.nmb-it.de/mail/nmb-archiver:latest
        restart: unless-stopped
        ports:
            - '${HOST_PORT}:3000'
        env_file:
            - .env
        environment:
            STORAGE_LOCAL_ROOT_PATH: /var/data/open-archiver
        volumes:
            - oadata:/var/data/open-archiver
        depends_on:
            - postgres
            - valkey
            - meilisearch
        networks:
            - open-archiver-net

    postgres:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-open_archive}
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - open-archiver-net

    valkey:
        image: valkey/valkey:8-alpine
        restart: unless-stopped
        command: valkey-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - valkeydata:/data
        networks:
            - open-archiver-net

    meilisearch:
        image: getmeili/meilisearch:v1.15
        restart: unless-stopped
        environment:
            MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aSampleMasterKey}
        volumes:
            - meilidata:/meili_data
        networks:
            - open-archiver-net

    tika:
        image: apache/tika:3.2.2.0-full
        restart: always
        networks:
            - open-archiver-net

volumes:
    oadata:
        driver: local
    pgdata:
        driver: local
    valkeydata:
        driver: local
    meilidata:
        driver: local

networks:
    open-archiver-net:
        driver: bridge
